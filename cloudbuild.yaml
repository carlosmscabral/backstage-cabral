steps:
  # This master pipeline runs on every PR merge to the main branch.
  # It finds all directories changed in the last commit.
  # If a changed directory contains its own cloudbuild.yaml, it triggers a sub-build.
  # Step 1: Discover changed directories using the official git image.
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Calculating changed files from the current merge commit..."
        
        # In a shallow clone triggered by a PR merge, the HEAD commit is the merge commit itself.
        # `git log -m -1 --name-only --pretty="format:" HEAD` lists exactly the files changed in this merge commit
        # without needing to fetch older history.
        CHANGED_DIRS=$$(git log -m -1 --name-only --pretty="format:" HEAD | awk -F/ '{if (NF>1) print $$1"/"$$2}' | sort | uniq | grep -v '^$$')
        
        echo "Changed directories detected:"
        echo "$$CHANGED_DIRS"
        
        # Save to a workspace file to pass to the next step
        echo "$$CHANGED_DIRS" > /workspace/changed_dirs.txt

  # Step 2: Trigger sub-builds using the gcloud SDK image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    env:
      - 'COMMIT_SHA=$COMMIT_SHA'
      - 'BRANCH_NAME=$BRANCH_NAME'
      - 'REPO_NAME=$REPO_NAME'
    args:
      - '-c'
      - |
        CHANGED_DIRS=$$(cat /workspace/changed_dirs.txt)
        echo "Directories to inspect: $$CHANGED_DIRS"
        
        for dir in $$CHANGED_DIRS; do
          if [ -d "$$dir" ] && [ -f "$$dir/cloudbuild.yaml" ]; then
            echo "================================================="
            echo "🚀 Launching dynamic Sub-Build for: $$dir"
            echo "================================================="
            # Submit a build specifically using the sub-folder's configuration
            gcloud builds submit $$dir --config=$$dir/cloudbuild.yaml --substitutions=COMMIT_SHA="$$COMMIT_SHA"
          else
            if [ -n "$$dir" ]; then
              echo "Skipping $$dir: Not a directory or no localized cloudbuild.yaml found."
            fi
          fi
        done
        
        echo "Central Dispatcher Complete."

options:
  logging: CLOUD_LOGGING_ONLY
